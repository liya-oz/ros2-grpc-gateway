services:
  ros2:
    build:
      context: ./ros_ws
      dockerfile: ros2.dev.Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO}
        DEV_UID: ${DEV_UID}
        DEV_GID: ${DEV_GID}
    image: tb3-dev:${ROS_DISTRO}
    env_file:
      - ./.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ./ros_ws:/work/ros_ws
    working_dir: /work/ros_ws
    command:
      - bash
      - -c
      - |
        source /opt/ros/${ROS_DISTRO}/setup.bash
        cd /work/ros_ws
        colcon build
        source install/setup.bash
        python3 -m py_basics.talker
    tty: true
    stdin_open: true
    networks: [appnet]

  ros-grpc:
    build:
      context: .
      dockerfile: ros-grpc/Dockerfile
    env_file:
      - ./.env
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - GRPC_PORT=50051
    depends_on:
      - ros2
    working_dir: /app
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        python3 grpc_server.py
    ports:
      - "50051:50051"
    networks: [appnet]

  backend:
      build:
        context: .
        dockerfile: backend/Dockerfile
      depends_on:
        - ros2
      ports:
        - "5000:5000"
      networks: [appnet]

  frontend:
      build: ./frontend
      image: ros2-web-bridge-frontend
      ports:
        - "5173:80"
      depends_on:
        - backend
      networks: [appnet]

networks:
  appnet:
    driver: bridge